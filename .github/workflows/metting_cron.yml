name: Auto Meeting Minutes Cron

on:
  schedule:
    - cron: '*/5 * * * *' # 매 5분마다 실행
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 코드를 GitHub 서버로 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필요한 파이썬 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 비밀 금고에서 보안 파일들 생성하기
      env:
        GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        ENV_CONTENT: ${{ secrets.ENV_CONTENT }}
        TERMINOLOGY_JSON: ${{ secrets.TERMINOLOGY_JSON }}
      run: |
        echo "$GOOGLE_TOKEN_JSON" > token.json
        echo "$ENV_CONTENT" > .env
        echo "$TERMINOLOGY_JSON" > terminology.json

    - name: 봇 실행!
      run: python -u cron_watcher.py
    
    - name: 처리 완료 목록 GitHub에 저장하기
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add processed_history.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "📝 회의록 처리 내역 업데이트" && git push)

      